name: keep-alive

# Render 무료 인스턴스가 15분 미사용 시 잠들어 첫 접속이 느려지는 것을 방지.
# 10분마다 헬스체크에 핑을 보내 깨어 있게 한다. (공개 저장소라 Actions 무료)
on:
  schedule:
    - cron: '*/10 * * * *' # 10분마다
  workflow_dispatch: {} # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://comchin.onrender.com/api/health)
          echo "health: $code"
